<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SemillApp — Gestión de planta de semillas</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2f8a3e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SemillApp">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#eef2ec; --panel:#ffffff; --panel2:#f4f7f2; --line:#dde5d9;
    --text:#1d2a1f; --muted:#6b7a6b; --green:#2f8a3e; --green2:#256e32;
    --accent:#2f8a3e; --amber:#b8801f; --red:#c43d38; --blue:#3667c9;
    --shadow:0 1px 3px rgba(30,50,30,.06),0 1px 2px rgba(30,50,30,.04);
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  a{color:var(--green2)}
  .app{display:flex;min-height:100vh}
  .sidebar{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;padding:6px 8px 18px;color:var(--green2)}
  .brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#3fa34d,#7bc47f);display:flex;align-items:center;justify-content:center;font-size:19px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:10px 12px;border-radius:9px;cursor:pointer;font-size:14px;margin-bottom:2px;font-weight:500}
  .nav button:hover{background:var(--panel2);color:var(--text)}
  .nav button.active{background:#e6f3e8;color:var(--green2);font-weight:700}
  .nav .ico{width:18px;text-align:center}
  .side-foot{margin-top:auto;font-size:11px;color:var(--muted);padding:8px}
  .side-foot button{width:100%;margin-top:6px}
  .main{flex:1;padding:24px 28px;max-width:1240px}
  .head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .head h1{margin:0;font-size:22px}
  .head .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(165px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .kpi .val{font-size:25px;font-weight:800;margin-top:6px}
  .kpi .val.green{color:var(--green)} .kpi .val.amber{color:var(--amber)} .kpi .val.red{color:var(--red)} .kpi .val.blue{color:var(--blue)}
  .btn{background:var(--green);color:#fff;border:none;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
  .btn:hover{background:var(--green2)}
  .btn.sec{background:#fff;color:var(--text);border:1px solid var(--line)}
  .btn.sec:hover{border-color:var(--green);color:var(--green2)}
  .btn.sm{padding:5px 9px;font-size:12px}
  .btn.danger{background:none;color:var(--red);border:1px solid transparent}
  .btn.danger:hover{border-color:var(--red)}
  .btn.ghost{background:none;color:var(--muted);border:1px solid var(--line)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
  tbody tr:hover td{background:var(--panel2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .tag.b{background:#e7edfb;color:var(--blue)}
  .tag.g{background:#e3f3e6;color:var(--green2)}
  .tag.a{background:#fbf0db;color:var(--amber)}
  .tag.r{background:#fbe6e5;color:var(--red)}
  .tag.m{background:var(--panel2);color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:36px}
  input,select,textarea{background:#fff;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(47,138,62,.12)}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
  .field{margin-bottom:12px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .toolbar .search{flex:1;min-width:160px;max-width:320px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,35,22,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:640px;padding:22px;box-shadow:0 10px 40px rgba(20,35,22,.18)}
  .modal h2{margin:0 0 16px;font-size:18px}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
  .muted{color:var(--muted)}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}
  .line-items th,.line-items td{padding:7px 8px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green2);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;z-index:99;pointer-events:none;box-shadow:0 6px 20px rgba(20,35,22,.25)}
  .toast.show{opacity:1}
  .sect-title{font-size:15px;font-weight:700;margin:0 0 12px}
  .bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);z-index:40;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 10px rgba(20,35,22,.06);overflow-x:auto}
  .bottomnav .bn-row{display:flex;min-width:max-content}
  .bottomnav button{flex:0 0 auto;width:72px;background:none;border:none;color:var(--muted);padding:8px 2px 6px;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
  .bottomnav button .ico{font-size:18px}
  .bottomnav button.active{color:var(--green)}
  .menu-btn{display:none}
  .chartbar{display:flex;align-items:flex-end;gap:10px;height:180px;padding:10px 4px;overflow-x:auto}
  .chartbar .bar-col{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:46px}
  .chartbar .bar{width:30px;background:linear-gradient(180deg,#4caf5a,#2f8a3e);border-radius:6px 6px 0 0;transition:.3s}
  .chartbar .bar-lbl{font-size:11px;color:var(--muted);text-align:center}
  .chartbar .bar-val{font-size:10px;color:var(--text);font-weight:600}
  @media(max-width:760px){
    .sidebar{display:none}
    .main{padding:14px 14px 86px}
    .bottomnav{display:block}
    .head h1{font-size:19px}
    .card{padding:13px}
    .card.scroll{overflow-x:auto}
    .modal-bg{padding:0;align-items:flex-end}
    .modal{max-width:100%;border-radius:16px 16px 0 0;max-height:92vh;overflow:auto}
    .row2,.row3{grid-template-columns:1fr}
    table{min-width:560px}
    .menu-btn{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;margin-bottom:12px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="logo">🌱</span> SemillApp</div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      Datos guardados en este dispositivo.
      <button class="btn sec sm" onclick="backup()">⬇ Exportar respaldo</button>
      <button class="btn ghost sm" onclick="document.getElementById('imp').click()">⬆ Importar respaldo</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="restore(event)">
      <button class="btn ghost sm" onclick="cargarDemo()">Cargar datos de ejemplo</button>
    </div>
  </aside>
  <main class="main" id="view"></main>
</div>
<nav class="bottomnav" id="bottomnav"></nav>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ===== Persistencia ===== */
const KEY="semillapp_v1";
const blank={productos:[],costos:{},inventario:[],clientes:[],pedidos:[],despachos:[],proveedores:[],compras:[],insumos:[]};
let db=load();
function load(){try{return Object.assign({},JSON.parse(JSON.stringify(blank)),JSON.parse(localStorage.getItem(KEY)||"{}"))}catch(e){return JSON.parse(JSON.stringify(blank))}}
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
const $=s=>document.querySelector(s);
const money=n=>"$"+(Number(n)||0).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const num=n=>(Number(n)||0).toLocaleString("es-AR");
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}

/* ===== Helpers de negocio ===== */
function prod(id){return db.productos.find(p=>p.id===id)}
function costoBolsa(pid){return (db.costos[pid]||[]).reduce((s,c)=>s+(Number(c.monto)||0),0)}
function producido(pid){return db.inventario.filter(m=>m.productoId===pid).reduce((s,m)=>s+(Number(m.cantidad)||0),0)}
function vendido(pid){let t=0;db.pedidos.forEach(o=>{if(o.estado!=="borrador")o.items.forEach(it=>{if(it.productoId===pid)t+=Number(it.cantidad)||0})});return t}
function stock(pid){return producido(pid)-vendido(pid)}
function cliente(id){return db.clientes.find(c=>c.id===id)}
function proveedor(id){return db.proveedores.find(p=>p.id===id)}
function insumo(id){return db.insumos.find(i=>i.id===id)}
function comprado(iid){let t=0;db.compras.forEach(c=>c.items.forEach(it=>{if(it.insumoId===iid)t+=Number(it.cantidad)||0}));return t}
function consumido(iid){let t=0;db.inventario.forEach(l=>(l.consumos||[]).forEach(c=>{if(c.insumoId===iid)t+=Number(c.cantidad)||0}));return t}
function stockInsumo(iid){return comprado(iid)-consumido(iid)}
function precioCliente(cid,pid){const c=cliente(cid),p=prod(pid);if(!p)return 0;if(c&&c.precios&&c.precios[pid]!=null&&c.precios[pid]!=="")return Number(c.precios[pid]);const base=Number(p.precioVenta)||0;const d=c&&c.descuento?Number(c.descuento):0;return Math.round(base*(1-d/100));}
function totalPedido(o){return o.items.reduce((s,it)=>s+(Number(it.cantidad)||0)*(Number(it.precio)||0),0)}
function costoPedido(o){return o.items.reduce((s,it)=>s+(Number(it.cantidad)||0)*costoBolsa(it.productoId),0)}
function totalCompra(c){return c.items.reduce((s,it)=>s+(Number(it.cantidad)||0)*(Number(it.precio)||0),0)}

/* ===== Utilidades UI ===== */
function exportCSV(nombre,headers,rows){
  const linea=a=>a.map(v=>{v=v==null?"":String(v);return /[",;\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(";");
  const csv="﻿"+[linea(headers),...rows.map(linea)].join("\n");
  const b=new Blob([csv],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download=nombre+".csv";a.click();toast("CSV exportado");
}
function printHTML(titulo,inner){
  const w=window.open("","_blank");
  w.document.write('<html><head><title>'+titulo+'</title><meta charset="utf-8"><style>body{font-family:Arial;padding:30px;color:#111;max-width:900px;margin:auto}h1{color:#256e32}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;font-size:13px}th{background:#eef4ec}.r{text-align:right}@media print{button{display:none}}</style></head><body>'+inner+'<button onclick="window.print()" style="margin-top:20px;padding:8px 16px">Imprimir / Guardar PDF</button></body></html>');
  w.document.close();
}
function barChart(data){ // data: [{label,value,sub}]
  const max=Math.max(1,...data.map(d=>d.value));
  return '<div class="chartbar">'+data.map(d=>{
    const h=Math.round((d.value/max)*150)+2;
    return '<div class="bar-col"><div class="bar-val">'+(d.sub||"")+'</div><div class="bar" style="height:'+h+'px" title="'+esc(d.label)+'"></div><div class="bar-lbl">'+esc(d.label)+'</div></div>';
  }).join("")+'</div>';
}
let search={};
function setSearch(k,v){search[k]=v.toLowerCase();render();}
function matchRow(k,txt){const q=search[k];if(!q)return true;return (txt||"").toLowerCase().includes(q);}
function searchBar(k,ph){return '<input class="search" placeholder="'+ph+'" value="'+esc(search[k]||"")+'" oninput="setSearch(\''+k+'\',this.value)">';}
/* ===== Navegación ===== */
const TABS=[
  {id:"dashboard",ico:"📊",label:"Panel",short:"Panel"},
  {id:"productos",ico:"🌾",label:"Productos",short:"Prod."},
  {id:"costos",ico:"🧮",label:"Costos",short:"Costos"},
  {id:"inventario",ico:"📦",label:"Inventario",short:"Stock"},
  {id:"compras",ico:"🛒",label:"Compras",short:"Compras"},
  {id:"clientes",ico:"👥",label:"Clientes",short:"Clientes"},
  {id:"pedidos",ico:"🧾",label:"Pedidos / Ventas",short:"Ventas"},
  {id:"despachos",ico:"🚚",label:"Despachos",short:"Despacho"},
  {id:"reportes",ico:"📈",label:"Reportes",short:"Reportes"},
];
let tab="dashboard";
function renderNav(){
  $("#nav").innerHTML=TABS.map(t=>'<button class="'+(t.id===tab?'active':'')+'" onclick="go(\''+t.id+'\')"><span class="ico">'+t.ico+'</span>'+t.label+'</button>').join("");
  $("#bottomnav").innerHTML='<div class="bn-row">'+TABS.map(t=>'<button class="'+(t.id===tab?'active':'')+'" onclick="go(\''+t.id+'\')"><span class="ico">'+t.ico+'</span>'+t.short+'</button>').join("")+'</div>';
}
function go(t){tab=t;renderNav();render();window.scrollTo(0,0);}
function menuMas(){openModal("Datos y respaldo",
  '<p class="muted" style="margin-top:0">Tus datos se guardan en este dispositivo.</p>'+
  '<button class="btn sec" style="width:100%;margin-bottom:8px" onclick="backup()">⬇ Exportar respaldo (.json)</button>'+
  '<button class="btn sec" style="width:100%;margin-bottom:8px" onclick="document.getElementById(\'imp\').click()">⬆ Importar respaldo</button>'+
  '<button class="btn ghost" style="width:100%" onclick="cargarDemo()">Cargar datos de ejemplo</button>',null);}

function render(){({dashboard:vDashboard,productos:vProductos,costos:vCostos,inventario:vInventario,compras:vCompras,clientes:vClientes,pedidos:vPedidos,despachos:vDespachos,reportes:vReportes})[tab]();}
function head(title,sub,btn){return '<button class="menu-btn" onclick="menuMas()">⚙ Datos y respaldo</button><div class="head"><div><h1>'+title+'</h1>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div><div>'+(btn||'')+'</div></div>';}
function kpi(label,val,cls){return '<div class="card kpi"><div class="label">'+label+'</div><div class="val '+(cls||"")+'">'+val+'</div></div>';}

/* ===== Panel ===== */
function vDashboard(){
  const nProd=db.productos.length;
  const stockTotal=db.productos.reduce((s,p)=>s+stock(p.id),0);
  const ventas=db.pedidos.filter(o=>o.estado!=="borrador");
  const ingresos=ventas.reduce((s,o)=>s+totalPedido(o),0);
  const margen=ingresos-ventas.reduce((s,o)=>s+costoPedido(o),0);
  const margenPct=ingresos?(margen/ingresos*100):0;
  const gastoCompras=db.compras.reduce((s,c)=>s+totalCompra(c),0);
  const pendientes=db.pedidos.filter(o=>o.estado==="confirmado").length;
  const enCamino=db.despachos.filter(d=>d.estado!=="entregado").length;
  let bajo=db.productos.filter(p=>stock(p.id)<=10);
  let h=head("Panel general","Resumen de la planta al "+new Date().toLocaleDateString("es-AR"));
  h+='<div class="grid kpis">'+
    kpi("Productos",nProd)+
    kpi("Stock total (bolsas)",num(stockTotal))+
    kpi("Ingresos por ventas",money(ingresos),"green")+
    kpi("Margen bruto",money(margen)+" · "+margenPct.toFixed(0)+"%",margen>=0?"green":"red")+
    kpi("Compras (insumos)",money(gastoCompras),"blue")+
    kpi("Pedidos por despachar",pendientes,pendientes?"amber":"")+
    kpi("Despachos en curso",enCamino,enCamino?"amber":"")+
  '</div>';
  h+='<div class="card scroll" style="margin-top:18px"><div class="sect-title">Rentabilidad por producto</div>';
  if(!nProd){h+='<div class="empty">Aún no cargaste productos. Empezá en <b>Productos</b> o tocá <b>Cargar datos de ejemplo</b>.</div>';}
  else{
    h+='<table><thead><tr><th>Producto</th><th class="num">Costo/bolsa</th><th class="num">Precio lista</th><th class="num">Margen</th><th class="num">Stock</th></tr></thead><tbody>';
    db.productos.forEach(p=>{const c=costoBolsa(p.id),pr=Number(p.precioVenta)||0,m=pr-c,mp=pr?(m/pr*100):0;
      h+='<tr><td><b>'+esc(p.nombre)+'</b> <span class="muted">'+esc(p.cultivo||"")+'</span></td><td class="num">'+money(c)+'</td><td class="num">'+money(pr)+'</td><td class="num" style="color:'+(m>=0?'var(--green)':'var(--red)')+'">'+money(m)+(pr?' <span class="muted">('+mp.toFixed(0)+'%)</span>':'')+'</td><td class="num">'+num(stock(p.id))+'</td></tr>';});
    h+='</tbody></table>';
  }
  h+='</div>';
  if(bajo.length)h+='<div class="card" style="margin-top:14px;border-color:var(--amber)"><div class="sect-title" style="color:var(--amber)">⚠ Stock bajo (≤10 bolsas)</div>'+bajo.map(p=>esc(p.nombre)+": <b>"+num(stock(p.id))+"</b>").join(" · ")+'</div>';
  $("#view").innerHTML=h;
}

/* ===== Reportes ===== */
function vReportes(){
  let h=head("Reportes","Análisis de ventas, márgenes y clientes",'<button class="btn sec" onclick="imprimirReporte()">🖨 Imprimir / PDF</button>');
  const ventas=db.pedidos.filter(o=>o.estado!=="borrador");
  if(!ventas.length){h+='<div class="card"><div class="empty">Todavía no hay ventas confirmadas para reportar.</div></div>';$("#view").innerHTML=h;return;}
  // Ventas por mes
  const meses={};ventas.forEach(o=>{const m=(o.fecha||"").slice(0,7);meses[m]=(meses[m]||0)+totalPedido(o);});
  const dataMes=Object.keys(meses).sort().slice(-8).map(m=>({label:m,value:meses[m],sub:"$"+Math.round(meses[m]/1000)+"k"}));
  h+='<div class="card"><div class="sect-title">Ingresos por mes</div>'+barChart(dataMes)+'</div>';
  // Margen por producto
  const mp={};ventas.forEach(o=>o.items.forEach(it=>{const mg=(Number(it.precio)-costoBolsa(it.productoId))*Number(it.cantidad);mp[it.productoId]=(mp[it.productoId]||0)+mg;}));
  const dataProd=Object.keys(mp).map(pid=>({label:(prod(pid)||{}).nombre||"?",value:Math.max(0,mp[pid]),sub:"$"+Math.round(mp[pid]/1000)+"k"})).sort((a,b)=>b.value-a.value).slice(0,8);
  h+='<div class="card" style="margin-top:14px"><div class="sect-title">Margen por producto</div>'+barChart(dataProd)+'</div>';
  // Top clientes
  const tc={};ventas.forEach(o=>{tc[o.clienteId]=(tc[o.clienteId]||0)+totalPedido(o);});
  const filas=Object.keys(tc).map(cid=>({cid,total:tc[cid]})).sort((a,b)=>b.total-a.total).slice(0,10);
  h+='<div class="card scroll" style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:center"><div class="sect-title" style="margin:0">Ranking de clientes</div><button class="btn sec sm" onclick="exportTopClientes()">⬇ CSV</button></div><table style="margin-top:10px"><thead><tr><th>#</th><th>Cliente</th><th class="num">Total comprado</th></tr></thead><tbody>';
  filas.forEach((f,i)=>{h+='<tr><td>'+(i+1)+'</td><td>'+esc((cliente(f.cid)||{}).nombre||"-")+'</td><td class="num">'+money(f.total)+'</td></tr>';});
  h+='</tbody></table></div>';
  $("#view").innerHTML=h;
}

  else{h+='<table><thead><tr><th>Nombre</th><th>CUIT</th><th>Cond. IVA</th><th>Teléfono</th><th class="num">Desc.%</th><th></th></tr></thead><tbody>';

function exportClientes(){exportCSV("clientes",["Nombre","CUIT","CondIVA","Telefono","Direccion","Descuento%"],db.clientes.map(c=>[c.nombre,c.cuit,c.condicionIva,c.telefono,c.direccion,c.descuento]));}
function formCliente(id){const c=id?cliente(id):{};const precios=(c.precios)||{};
  const ivas=["Responsable Inscripto","Monotributo","Exento","Consumidor Final"];
  let preciosHtml=db.productos.length?'<label style="margin-top:6px">Precios especiales por producto (opcional)</label><div class="hint" style="margin-bottom:6px">Dejá vacío para usar el precio de lista menos el descuento.</div>'+db.productos.map(p=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="flex:1;font-size:13px">'+esc(p.nombre)+' <span class="muted">(lista '+money(p.precioVenta)+')</span></span><input type="number" id="cp_'+p.id+'" value="'+esc(precios[p.id]!=null?precios[p.id]:"")+'" placeholder="precio" style="max-width:130px"></div>').join(""):"";
  openModal((id?"Editar":"Nuevo")+" cliente",
    '<div class="field"><label>Nombre / Razón social *</label><input id="cl_nombre" value="'+esc(c.nombre||"")+'"></div>'+
    '<div class="row2"><div class="field"><label>CUIT</label><input id="cl_cuit" value="'+esc(c.cuit||"")+'" placeholder="30-12345678-9"></div>'+
    '<div class="field"><label>Condición IVA</label><select id="cl_iva"><option value="">—</option>'+ivas.map(v=>'<option '+(c.condicionIva===v?"selected":"")+'>'+v+'</option>').join("")+'</select></div></div>'+
    '<div class="row2"><div class="field"><label>Persona de contacto</label><input id="cl_contacto" value="'+esc(c.contacto||"")+'"></div>'+
    '<div class="field"><label>Teléfono</label><input id="cl_tel" value="'+esc(c.telefono||"")+'"></div></div>'+
    '<div class="row2"><div class="field"><label>Dirección de entrega</label><input id="cl_dir" value="'+esc(c.direccion||"")+'"></div>'+
    '<div class="field"><label>Descuento general (%)</label><input id="cl_desc" type="number" value="'+esc(c.descuento||"")+'" placeholder="0"></div></div>'+
    preciosHtml,
    ()=>{const n=$("#cl_nombre").value.trim();if(!n)return toast("Falta el nombre");
      const d=$("#cl_desc").value;if(d&&(Number(d)<0||Number(d)>100))return toast("Descuento 0-100");
      const pr={};db.productos.forEach(p=>{const v=$("#cp_"+p.id);if(v&&v.value!=="")pr[p.id]=Number(v.value);});
      const o={id:id||uid(),nombre:n,cuit:$("#cl_cuit").value.trim(),condicionIva:$("#cl_iva").value,contacto:$("#cl_contacto").value.trim(),telefono:$("#cl_tel").value.trim(),direccion:$("#cl_dir").value.trim(),descuento:d,precios:pr};
      if(id)Object.assign(cliente(id),o);else db.clientes.push(o);save();closeModal();render();toast("Cliente guardado");});
}
function delCliente(id){if(!confirm("¿Eliminar cliente?"))return;db.clientes=db.clientes.filter(c=>c.id!==id);save();render();}

/* ===== Pedidos / Ventas ===== */
let tmpItems=[];
function vPedidos(){
  let h=head("Pedidos / Ventas","El precio se toma de cada cliente (lista, descuento o precio especial)",'<button class="btn" onclick="formPedido()">+ Nuevo pedido</button>');
  h+='<div class="card scroll"><div class="toolbar">'+searchBar("ped","Buscar cliente…")+'<div style="flex:1"></div><button class="btn sec sm" onclick="exportPedidos()">⬇ Excel/CSV</button></div>';
  const list=db.pedidos.filter(o=>matchRow("ped",(cliente(o.clienteId)||{}).nombre||"")).slice().reverse();
  if(!list.length)h+='<div class="empty">Sin pedidos.</div>';
  else{h+='<table><thead><tr><th>Fecha</th><th>Cliente</th><th class="num">Bolsas</th><th class="num">Total</th><th class="num">Margen</th><th>Estado</th><th></th></tr></thead><tbody>';
    list.forEach(o=>{const bolsas=o.items.reduce((s,i)=>s+Number(i.cantidad||0),0);const tot=totalPedido(o),m=tot-costoPedido(o);const tg={borrador:"m",confirmado:"b",despachado:"g"};
      h+='<tr><td>'+o.fecha+'</td><td>'+esc((cliente(o.clienteId)||{}).nombre||"-")+'</td><td class="num">'+num(bolsas)+'</td><td class="num">'+money(tot)+'</td><td class="num" style="color:'+(m>=0?'var(--green)':'var(--red)')+'">'+money(m)+'</td><td><span class="tag '+tg[o.estado]+'">'+o.estado+'</span></td><td class="num">'+
      (o.estado==="borrador"?'<button class="btn sm" onclick="confirmarPedido(\''+o.id+'\')">Confirmar</button> ':'')+
      (o.estado==="confirmado"?'<button class="btn sm" onclick="crearDespacho(\''+o.id+'\')">🚚</button> ':'')+
      '<button class="btn sm sec" onclick="formPedido(\''+o.id+'\')">Ver</button> <button class="btn sm danger" onclick="delPedido(\''+o.id+'\')">🗑</button></td></tr>';});
    h+='</tbody></table>';}
  h+='</div>';$("#view").innerHTML=h;
}
function exportPedidos(){const rows=[];db.pedidos.forEach(o=>o.items.forEach(it=>rows.push([o.fecha,(cliente(o.clienteId)||{}).nombre||"",o.estado,(prod(it.productoId)||{}).nombre||"",it.cantidad,it.precio,(Number(it.cantidad)||0)*(Number(it.precio)||0)])));exportCSV("pedidos",["Fecha","Cliente","Estado","Producto","Cantidad","Precio","Subtotal"],rows);}
function formPedido(id){
  if(!db.clientes.length)return toast("Primero creá un cliente");
  if(!db.productos.length)return toast("Primero creá un producto");
  const o=id?db.pedidos.find(x=>x.id===id):null;tmpItems=o?JSON.parse(JSON.stringify(o.items)):[];
  const ro=o&&o.estado!=="borrador";
  openModal((id?(ro?"Pedido":"Editar pedido"):"Nuevo pedido"),
    '<div class="row2"><div class="field"><label>Cliente *</label><select id="o_cli" '+(ro?"disabled":"")+' onchange="recalcPrecios()">'+db.clientes.map(c=>'<option value="'+c.id+'" '+(o&&o.clienteId===c.id?"selected":"")+'>'+esc(c.nombre)+'</option>').join("")+'</select></div>'+
    '<div class="field"><label>Fecha</label><input id="o_fecha" type="date" value="'+esc(o?o.fecha:new Date().toISOString().slice(0,10))+'" '+(ro?"disabled":"")+'></div></div>'+
    '<label>Renglones <span class="muted">(precio según el cliente; editable)</span></label><div id="o_items"></div>'+
    (ro?'':'<button class="btn sec sm" style="margin-top:8px" onclick="addItem()">+ Agregar renglón</button>')+
    '<div id="o_total" style="text-align:right;margin-top:12px;font-size:15px"></div>',
    ro?null:()=>{const items=tmpItems.filter(i=>i.productoId&&i.cantidad);if(!items.length)return toast("Agregá un renglón");
      const data={id:id||uid(),clienteId:$("#o_cli").value,fecha:$("#o_fecha").value,items:items,estado:o?o.estado:"borrador"};
      if(id)Object.assign(db.pedidos.find(x=>x.id===id),data);else db.pedidos.push(data);save();closeModal();render();toast("Pedido guardado");});
  renderItems(ro);
}
function renderItems(ro){const c=$("#o_items");if(!c)return;if(!tmpItems.length&&ro){c.innerHTML='<div class="muted">Sin renglones</div>';return;}
  c.innerHTML='<table class="line-items"><thead><tr><th>Producto</th><th class="num">Stock</th><th class="num">Cant.</th><th class="num">Precio</th><th class="num">Subtotal</th><th></th></tr></thead><tbody>'+
    tmpItems.map((it,i)=>{const sub=(Number(it.cantidad)||0)*(Number(it.precio)||0);return '<tr><td>'+(ro?esc((prod(it.productoId)||{}).nombre||"-"):'<select onchange="tmpItems['+i+'].productoId=this.value;autoPrecio('+i+')">'+db.productos.map(p=>'<option value="'+p.id+'" '+(it.productoId===p.id?"selected":"")+'>'+esc(p.nombre)+'</option>').join("")+'</select>')+'</td><td class="num muted">'+(it.productoId?num(stock(it.productoId)):"-")+'</td><td class="num" style="max-width:80px">'+(ro?num(it.cantidad):'<input type="number" value="'+esc(it.cantidad||"")+'" oninput="tmpItems['+i+'].cantidad=this.value;renderItems()" style="text-align:right">')+'</td><td class="num" style="max-width:110px">'+(ro?money(it.precio):'<input type="number" value="'+esc(it.precio||"")+'" oninput="tmpItems['+i+'].precio=this.value;renderItems()" style="text-align:right">')+'</td><td class="num">'+money(sub)+'</td><td class="num">'+(ro?"":'<button class="btn sm danger" onclick="rmItem('+i+')">✕</button>')+'</td></tr>';}).join("")+'</tbody></table>';
  const tot=tmpItems.reduce((s,it)=>s+(Number(it.cantidad)||0)*(Number(it.precio)||0),0);
  if($("#o_total"))$("#o_total").innerHTML='Total: <b style="color:var(--green)">'+money(tot)+'</b>';
}
function addItem(){const cid=$("#o_cli").value;const p=db.productos[0];tmpItems.push({productoId:p.id,cantidad:1,precio:precioCliente(cid,p.id)});renderItems();}
function autoPrecio(i){const cid=$("#o_cli").value;tmpItems[i].precio=precioCliente(cid,tmpItems[i].productoId);renderItems();}
function recalcPrecios(){const cid=$("#o_cli").value;tmpItems.forEach(it=>{if(it.productoId)it.precio=precioCliente(cid,it.productoId);});renderItems();}
function rmItem(i){tmpItems.splice(i,1);renderItems();}
function confirmarPedido(id){const o=db.pedidos.find(x=>x.id===id);for(const it of o.items){if(stock(it.productoId)<Number(it.cantidad)){if(!confirm("Stock insuficiente de "+(prod(it.productoId)||{}).nombre+" (hay "+stock(it.productoId)+", pedís "+it.cantidad+"). ¿Confirmar igual?"))return;break;}}o.estado="confirmado";save();render();toast("Pedido confirmado");}
function delPedido(id){if(!confirm("¿Eliminar pedido?"))return;db.pedidos=db.pedidos.filter(o=>o.id!==id);db.despachos=db.despachos.filter(d=>d.pedidoId!==id);save();render();}

/* ===== Despachos ===== */
function crearDespacho(pedidoId){if(db.despachos.find(d=>d.pedidoId===pedidoId))return toast("Ese pedido ya tiene despacho");
  const o=db.pedidos.find(x=>x.id===pedidoId);
  db.despachos.push({id:uid(),pedidoId:pedidoId,fecha:new Date().toISOString().slice(0,10),transportista:"",remito:"R-"+(db.despachos.length+1).toString().padStart(4,"0"),estado:"preparando"});
  o.estado="despachado";save();go("despachos");toast("Despacho creado");}
function vDespachos(){
  let h=head("Despachos / Logística","Preparación, remitos y entregas");
  h+='<div class="card scroll"><div class="toolbar">'+searchBar("desp","Buscar cliente/remito…")+'<div style="flex:1"></div></div>';
  const list=db.despachos.filter(d=>{const o=db.pedidos.find(x=>x.id===d.pedidoId);return matchRow("desp",((o?(cliente(o.clienteId)||{}).nombre:"")||"")+" "+(d.remito||""));}).slice().reverse();
  if(!list.length)h+='<div class="empty">Sin despachos.<br><span class="muted">Confirmá un pedido y tocá 🚚.</span></div>';
  else{h+='<table><thead><tr><th>Remito</th><th>Fecha</th><th>Cliente</th><th class="num">Bolsas</th><th>Transportista</th><th>Estado</th><th></th></tr></thead><tbody>';
    list.forEach(d=>{const o=db.pedidos.find(x=>x.id===d.pedidoId);const bolsas=o?o.items.reduce((s,i)=>s+Number(i.cantidad||0),0):0;const tg={preparando:"a",en_camino:"b",entregado:"g"};
      h+='<tr><td><b>'+esc(d.remito)+'</b></td><td>'+d.fecha+'</td><td>'+esc(o?(cliente(o.clienteId)||{}).nombre||"-":"-")+'</td><td class="num">'+num(bolsas)+'</td><td>'+(d.transportista?esc(d.transportista):'<span class="muted">—</span>')+'</td><td><span class="tag '+tg[d.estado]+'">'+d.estado.replace("_"," ")+'</span></td><td class="num"><button class="btn sm sec" onclick="formDespacho(\''+d.id+'\')">Gestionar</button> <button class="btn sm sec" onclick="verRemito(\''+d.id+'\')">Remito</button></td></tr>';});
    h+='</tbody></table>';}
  h+='</div>';$("#view").innerHTML=h;
}
function formDespacho(id){const d=db.despachos.find(x=>x.id===id);
  openModal("Gestionar despacho "+d.remito,
    '<div class="row2"><div class="field"><label>Transportista</label><input id="d_trans" value="'+esc(d.transportista||"")+'" placeholder="Nombre / empresa"></div>'+
    '<div class="field"><label>Fecha</label><input id="d_fecha" type="date" value="'+esc(d.fecha)+'"></div></div>'+
    '<div class="field"><label>Estado</label><select id="d_estado">'+["preparando","en_camino","entregado"].map(e=>'<option value="'+e+'" '+(d.estado===e?"selected":"")+'>'+e.replace("_"," ")+'</option>').join("")+'</select></div>',
    ()=>{d.transportista=$("#d_trans").value.trim();d.fecha=$("#d_fecha").value;d.estado=$("#d_estado").value;save();closeModal();render();toast("Despacho actualizado");});
}
function verRemito(id){const d=db.despachos.find(x=>x.id===id);const o=db.pedidos.find(x=>x.id===d.pedidoId);const c=o?cliente(o.clienteId):{};
  let inner='<h1>🌱 Remito '+esc(d.remito)+'</h1><p><b>Fecha:</b> '+esc(d.fecha)+'<br><b>Cliente:</b> '+esc(c.nombre||"-")+'<br><b>CUIT:</b> '+esc(c.cuit||"-")+'<br><b>Dirección:</b> '+esc(c.direccion||"-")+'<br><b>Transportista:</b> '+esc(d.transportista||"-")+'</p>';
  inner+='<table><thead><tr><th>Producto</th><th class="r">Bolsas</th></tr></thead><tbody>'+o.items.map(it=>'<tr><td>'+esc((prod(it.productoId)||{}).nombre||"-")+'</td><td class="r">'+num(it.cantidad)+'</td></tr>').join("")+'</tbody></table>';
  inner+='<p style="margin-top:40px">Firma de recepción: ______________________</p>';printHTML("Remito "+d.remito,inner);
}

/* ===== Modal / Respaldo ===== */

function closeModal(){$("#modalBg").classList.remove("show");onSave=null;}
$("#modalBg").addEventListener("click",e=>{if(e.target.id==="modalBg")closeModal();});
function backup(){const b=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="semillapp-respaldo-"+new Date().toISOString().slice(0,10)+".json";a.click();}
function restore(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{db=Object.assign({},JSON.parse(JSON.stringify(blank)),JSON.parse(r.result));save();render();toast("Respaldo importado");}catch(x){toast("Archivo inválido");}};r.readAsText(f);}
